name: CI

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  arch-check:
    name: Architecture Check
    runs-on: ubuntu-latest
    # Only run when backend source or arch scripts change
    if: >-
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run arch:check
      - name: Upload architecture report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-report
          path: docs/architecture/
          retention-days: 30

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nap_admin
          POSTGRES_PASSWORD: nap_test_pw
          POSTGRES_DB: nap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U nap_admin -d nap_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: test
      DATABASE_URL_TEST: postgres://nap_admin:nap_test_pw@localhost:5432/nap_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Enable PG extensions
        run: |
          PGPASSWORD=nap_test_pw psql -h localhost -U nap_admin -d nap_test -c "
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
            CREATE EXTENSION IF NOT EXISTS vector;
          "
      - name: Bootstrap admin schema
        run: npm -w apps/nap-serv run setupAdmin:test
      - name: Run migrations
        run: npm -w apps/nap-serv run migrate:test
      - name: Run tests
        run: npm -w apps/nap-serv test
